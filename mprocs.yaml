procs:
  server:
    cwd: .
    shell: cargo run --bin db-rs-server
    autostart: true

  cli:
    cwd: .
    shell: until cargo run --bin db-rs-cli ping >/dev/null 2>&1; do sleep 0.2; done; cargo run --bin db-rs-cli set foo bar && cargo run --bin db-rs-cli get foo
    autostart: true

  hello-world:
    cwd: .
    shell: until cargo run --bin db-rs-cli ping >/dev/null 2>&1; do sleep 0.2; done; cargo run --example hello_world
    autostart: true

  del:
    cwd: .
    shell: until cargo run --bin db-rs-cli ping >/dev/null 2>&1; do sleep 0.2; done; cargo run --example del
    autostart: true

  exists:
    cwd: .
    shell: until cargo run --bin db-rs-cli ping >/dev/null 2>&1; do sleep 0.2; done; cargo run --example exists
    autostart: true

  ttl:
    cwd: .
    shell: until cargo run --bin db-rs-cli ping >/dev/null 2>&1; do sleep 0.2; done; cargo run --example ttl
    autostart: true

  sub:
    cwd: .
    shell: until cargo run --bin db-rs-cli ping >/dev/null 2>&1; do sleep 0.2; done; cargo run --example sub
    autostart: true

  pub:
    cwd: .
    shell: until cargo run --bin db-rs-cli ping >/dev/null 2>&1; do sleep 0.2; done; cargo run --example pub
    autostart: true

  aof-append:
    cwd: .
    shell: cargo run --example aof_append
    autostart: true

  aof-replay:
    cwd: .
    shell: cargo run --example aof_replay
    autostart: true

  snapshot-restore:
    cwd: .
    shell: cargo run --example snapshot_restore
    autostart: true

  aof-rewrite:
    cwd: .
    shell: cargo run --example aof_rewrite
    autostart: true

  change_stream:
    cwd: .
    shell: until cargo run --bin db-rs-cli ping >/dev/null 2>&1; do sleep 0.2; done; cargo run --example change_stream
    autostart: true
